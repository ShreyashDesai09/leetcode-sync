name: Auto Category Sorter

on:
  push:
    branches:
      - main
    paths:
      - '**.java'
      - '**.sql'

jobs:
  sort-and-archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Archive and Bifurcate
        run: |
          # 1. Create the ALL_CODES archive (The Vault)
          mkdir -p ALL_CODES
          
          # Use a loop with existence check to prevent 'cannot stat' errors
          for file in *.{java,sql}; do
            [ -e "$file" ] || continue
            cp "$file" ALL_CODES/
            echo "Archived $file to ALL_CODES"
          done

          # 2. Define categories and their keywords
          declare -A categories
          categories["Arrays"]="array sum element jump squares"
          categories["Linked_Lists"]="list_cycle middle_of_the linked_list"
          categories["Two_Pointers"]="two_pointers remove_element pair_sum"
          categories["SQL"]="customer employee table earning"
          categories["Hash_Table"]="hash map dictionary"
          categories["Dynamic_Programming"]="house_robber climbing_stairs"

          # 3. Sort files into categories based on keywords
          for file in *.{java,sql}; do
            [ -e "$file" ] || continue
            filename_lower=$(echo "$file" | tr '[:upper:]' '[:lower:]')
            
            for cat in "${!categories[@]}"; do
              for keyword in ${categories[$cat]}; do
                if [[ "$filename_lower" == *"$keyword"* ]]; then
                  mkdir -p "$cat"
                  cp "$file" "$cat/"
                  echo "Categorized $file into $cat"
                  break 
                fi
              done
            done
            
            # 4. Move original to Master_List to clear the root folder
            mkdir -p Master_List
            mv "$file" Master_List/
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          # Only commit if changes were actually made by the robot
          if ! git diff --cached --quiet; then
            git commit -m "Automated: Archived to ALL_CODES and Bifurcated categories"
            git push
          else
            echo "No changes to commit"
          fi
